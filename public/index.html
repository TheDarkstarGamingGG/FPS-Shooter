<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Factory MMO</title>
  <style>
    body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
    canvas { display: block; }
    
    /* Login */
    #login-screen { position: absolute; inset: 0; background: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
    input { margin: 5px; padding: 12px; background: #222; border: 1px solid #0f0; color: #0f0; width: 200px; }

    /* HUD Elements */
    #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: rgba(255,255,255,0.5); transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none; border: 1px solid #000; }
    
    /* Collapsible Crafting Menu */
    #menu-container { position: absolute; top: 10px; right: 10px; width: 180px; z-index: 50; }
    #toggle-craft { width: 100%; padding: 10px; background: #ff8c00; border: none; font-weight: bold; color: white; border-radius: 5px; }
    #crafting-menu { display: none; background: rgba(0,0,0,0.85); border: 1px solid #ff8c00; padding: 10px; margin-top: 5px; max-height: 60vh; overflow-y: auto; border-radius: 5px; }
    .craft-btn { display: block; width: 100%; margin: 4px 0; background: #333; color: #fff; border: 1px solid #555; padding: 8px; font-size: 12px; text-align: left; border-radius: 3px; }

    /* Hotbar */
    #hotbar { position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 40; }
    .slot { width: 45px; height: 45px; background: rgba(0,0,0,0.6); border: 2px solid #555; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; color: white; border-radius: 4px; }
    .slot.active { border-color: #0f0; background: rgba(0,255,0,0.2); }

    /* Mobile Controls */
    #mobile-ui { position: absolute; bottom: 10px; width: 100%; display: flex; justify-content: space-between; pointer-events: none; z-index: 30;}
    #move-zone { width: 120px; height: 120px; margin-left: 15px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; pointer-events: auto; }
    #action-zone { width: 120px; margin-right: 15px; pointer-events: auto; display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end; gap: 10px; }
    .btn { background: rgba(255,255,255,0.15); border: 1px solid #fff; border-radius: 8px; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; }
    .action-btn { width: 70px; height: 70px; border-radius: 50%; background: rgba(255,140,0,0.4); border: 2px solid #ff8c00; color: white; font-weight: bold; }
  </style>
</head>
<body>
  <div id="login-screen">
    <h2 style="color:#ff8c00">FACTORY MMO</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()" style="padding:10px 40px; background:#ff8c00; border:none; color:white; font-weight:bold; margin-top:10px;">JOIN</button>
  </div>

  <div id="crosshair"></div>

  <div id="menu-container">
    <button id="toggle-craft">CRAFTING ▼</button>
    <div id="crafting-menu">
      <button class="craft-btn" onclick="socket.emit('craft', 'furnace')">Furnace (10 Stone)</button>
      <button class="craft-btn" onclick="socket.emit('craft', 'iron_ingot')">Iron Ingot (1 Iron)</button>
      <button class="craft-btn" onclick="socket.emit('craft', 'bolts')">Bolts (1 Iron Ingot)</button>
      <button class="craft-btn" onclick="socket.emit('craft', 'wire')">3x Wire (1 Copper)</button>
      <button class="craft-btn" onclick="socket.emit('craft', 'drill')">Drill (5 Wire, 10 Bolt, 1 Gold)</button>
    </div>
  </div>

  <div id="hotbar">
    <div class="slot active" id="slot-0"><span>LASER</span></div>
    <div class="slot" id="slot-1"><span>DRILL</span><b id="count-drill">0</b></div>
    <div class="slot" id="slot-2"><span>FURNACE</span><b id="count-furnace">0</b></div>
    <div class="slot" id="slot-3"><span>INV</span><b id="count-stone">0</b></div>
  </div>

  <div id="mobile-ui">
    <div id="move-zone">
      <div></div><div class="btn" id="btn-w">W</div><div></div>
      <div class="btn" id="btn-a">A</div><div class="btn" id="btn-s">S</div><div class="btn" id="btn-d">D</div>
    </div>
    <div id="action-zone">
      <div class="action-btn" id="btn-action">ACTION</div>
    </div>
  </div>

  <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>
  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="client.js"></script>
</body>
</html>
