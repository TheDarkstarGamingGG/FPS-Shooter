<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Browser Automation MMO</title>
  <style>
    body { margin: 0; overflow: hidden; background: #111; font-family: monospace; color: white; touch-action: none; }
    canvas { display: block; }
    
    /* Login Screen */
    #login-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
    input { margin: 10px; padding: 10px; font-size: 16px; font-family: monospace; background: #222; border: 1px solid #0f0; color: #0f0; }
    button { padding: 10px 20px; font-size: 16px; font-weight: bold; background: #0f0; color: #000; border: none; cursor: pointer; }
    
    /* HUD & Menus */
    #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: red; transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none; z-index: 10;}
    #hud { position: absolute; top: 10px; left: 10px; pointer-events: none; z-index: 10; text-shadow: 1px 1px 0 #000; }
    #crafting-menu { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); border: 1px solid #0f0; padding: 10px; z-index: 20; max-height: 80vh; overflow-y: auto; }
    .craft-btn { display: block; width: 100%; margin: 5px 0; background: #333; color: white; border: 1px solid #555; text-align: left; }
    
    /* Mobile Controls */
    #mobile-ui { position: absolute; bottom: 20px; width: 100%; height: 30%; display: flex; justify-content: space-between; pointer-events: none; z-index: 5;}
    #move-zone { width: 40%; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; pointer-events: auto; padding-left: 20px; align-items: end;}
    #action-zone { width: 50%; pointer-events: auto; display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end; padding-right: 20px; gap: 10px; }
    .btn { width: 50px; height: 50px; background: rgba(255, 255, 255, 0.2); border: 1px solid #fff; display: flex; justify-content: center; align-items: center; }
    .action-btn { width: 70px; height: 70px; border-radius: 50%; background: rgba(255,0,0,0.4); border: 2px solid #f00; }
  </style>
</head>
<body>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <script src="/socket.io/socket.io.js"></script>

  <div id="login-screen">
    <h1 style="color:#0f0">FACTORY MMO</h1>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button id="btn-login">JOIN / CREATE</button>
  </div>

  <div id="crosshair"></div>
  
  <div id="hud">
    <h3>INVENTORY</h3>
    <pre id="inv-display">Loading...</pre>
  </div>

  <div id="crafting-menu">
    <h3>CRAFTING</h3>
    <button class="craft-btn" onclick="socket.emit('craft', 'furnace')">Furnace (10 Stone)</button>
    <button class="craft-btn" onclick="socket.emit('craft', 'iron_ingot')">Iron Ingot (1 Iron Ore)</button>
    <button class="craft-btn" onclick="socket.emit('craft', 'copper_ingot')">Copper Ingot (1 Copper Ore)</button>
    <button class="craft-btn" onclick="socket.emit('craft', 'gold_ingot')">Gold Ingot (1 Gold Ore)</button>
    <button class="craft-btn" onclick="socket.emit('craft', 'bolts')">Bolts (1 Iron Ingot)</button>
    <button class="craft-btn" onclick="socket.emit('craft', 'wire')">3x Wire (1 Copper Ingot)</button>
    <button class="craft-btn" onclick="socket.emit('craft', 'crafting_station')">Crafting Station (10 Bolts, 5 Iron Ingot)</button>
    <button class="craft-btn" style="border-color:gold" onclick="socket.emit('craft', 'drill')">Tier 1 Drill (5 Wire, 10 Bolts, 1 Gold Ingot)</button>
  </div>

  <div id="mobile-ui">
    <div id="move-zone">
      <div></div><div class="btn" id="btn-w">W</div><div></div>
      <div class="btn" id="btn-a">A</div><div class="btn" id="btn-s">S</div><div class="btn" id="btn-d">D</div>
    </div>
    <div id="action-zone">
      <div class="action-btn" id="btn-mine">MINE</div>
    </div>
  </div>
  
<div id="debug" style="position:fixed; bottom:0; left:0; width:100%; background:rgba(0,0,0,0.8); color:#0f0; font-size:10px; z-index:1000; pointer-events:none; height:50px; overflow:hidden;">Debug: Waiting for input...</div>
  
  <script type="module" src="client.js"></script>
</body>
</html>
