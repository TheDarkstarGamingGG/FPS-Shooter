<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Factory MMO</title>
  <style>
    body { margin: 0; overflow: hidden; background: #87CEEB; font-family: monospace; touch-action: none; color: white; user-select: none;}
    canvas { display: block; }
    
    #login-screen { position: absolute; inset: 0; background: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
    input, button { margin: 5px; padding: 12px; font-family: monospace; font-size: 16px; }
    button { background: #ff8c00; border: none; font-weight: bold; cursor: pointer; color: #000; }

    #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: rgba(255,255,255,0.8); transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none; z-index: 10; }
    
    #top-left-ui { position: absolute; top: 10px; left: 10px; display: flex; gap: 10px; z-index: 60; display: none; }
    .top-btn { width: 40px; height: 40px; background: rgba(0,0,0,0.6); border: 2px solid #555; color: white; font-weight: bold; border-radius: 5px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    
    #pc-hints { display: none; position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); padding: 10px; text-align: right; z-index: 20; border-left: 2px solid #ff8c00; }

    /* Fixed Menus */
    .menu { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); border: 2px solid #ff8c00; padding: 20px; z-index: 1000; max-height: 80vh; overflow-y: auto; min-width: 300px; box-shadow: 0 0 20px rgba(255,140,0,0.5); }
    .menu h3 { margin-top: 0; color: #ff8c00; text-align: center; border-bottom: 1px solid #555; padding-bottom: 10px;}
    .close-btn { background: #f00; color: #fff; width: 100%; margin-top: 10px; border: none; padding: 10px;}
    .craft-btn { display: block; width: 100%; margin: 5px 0; background: #333; color: #fff; border: 1px solid #555; padding: 10px; text-align: left; cursor: pointer;}
    .craft-btn:hover { background: #555; }

    #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 40; display: none;}
    .slot { width: 60px; height: 60px; background: rgba(0,0,0,0.8); border: 2px solid #555; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; text-align: center; word-wrap: break-word;}
    .slot.active { border-color: #0f0; background: rgba(0,255,0,0.3); box-shadow: 0 0 10px #0f0;}

    #chat-box { display: none; position: absolute; bottom: 90px; left: 10px; width: 300px; height: 200px; background: rgba(0,0,0,0.7); border: 1px solid #555; z-index: 100; flex-direction: column; }
    #chat-messages { flex-grow: 1; overflow-y: auto; padding: 8px; font-size: 13px; text-shadow: 1px 1px 0 #000; }
    #chat-input { width: 100%; box-sizing: border-box; background: rgba(0,0,0,0.9); color: white; border: none; border-top: 1px solid #555; padding: 8px; font-family: monospace; outline: none;}

    #mobile-ui { display: none; position: absolute; bottom: 0; width: 100%; height: 100%; pointer-events: none; z-index: 30; }
    #joystick-base { position: absolute; bottom: 90px; left: 20px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; }
    #joystick-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: rgba(255,255,255,0.4); border-radius: 50%; pointer-events: none; }
    #action-btn { position: absolute; bottom: 90px; right: 20px; width: 80px; height: 80px; border-radius: 50%; background: rgba(255,140,0,0.4); border: 2px solid #ff8c00; pointer-events: auto; display: flex; justify-content: center; align-items: center; font-weight: bold; }
  </style>
</head>
<body>
  <div id="login-screen">
    <h2 style="color:#ff8c00">FACTORY MMO</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button id="btn-login">ENTER WORLD</button>
  </div>

  <div id="top-left-ui">
    <div class="top-btn" id="btn-pause">||</div>
    <div class="top-btn" id="btn-chat-toggle">💬</div>
  </div>

  <div id="pc-hints">
    <b>[WASD]</b> Move<br>
    <b>[Click]</b> Lock Camera / Use<br>
    <b>[E]</b> Inventory<br>
    <b>[I]</b> Crafting<br>
    <b>[C]</b> Chat<br>
    <b>[R]</b> Rotate Building
  </div>

  <div id="crosshair"></div>

  <div id="pause-menu" class="menu">
    <h3>PAUSE / SETTINGS</h3>
    <label>Look Sensitivity: <span id="sens-val">1.0</span></label>
    <input type="range" id="sens-slider" min="0.1" max="3.0" step="0.1" value="1.0" style="width:100%">
    <button class="close-btn" id="close-pause">RESUME</button>
  </div>

  <div id="inventory-menu" class="menu">
    <h3>INVENTORY</h3>
    <div id="inv-display" style="font-size: 14px; margin-bottom: 10px; min-height: 100px;">Loading...</div>
    <button class="close-btn" onclick="document.getElementById('inventory-menu').style.display='none'">CLOSE</button>
  </div>

  <div id="crafting-menu" class="menu">
    <h3>CRAFTING</h3>
    <button class="craft-btn" onclick="socket.emit('craft', 'furnace')">Furnace (10 Stone)</button>
    <button class="craft-btn" onclick="socket.emit('craft', 'iron_ingot')">Iron Ingot (1 Iron Ore)</button>
    <button class="craft-btn" onclick="socket.emit('craft', 'copper_ingot')">Copper Ingot (1 Copper Ore)</button>
    <button class="craft-btn" onclick="socket.emit('craft', 'gold_ingot')">Gold Ingot (1 Gold Ore)</button>
    <button class="craft-btn" onclick="socket.emit('craft', 'bolts')">Bolts (1 Iron Ingot)</button>
    <button class="craft-btn" onclick="socket.emit('craft', 'wire')">3x Wire (1 Copper Ingot)</button>
    <button class="craft-btn" onclick="socket.emit('craft', 'conveyor')">Conveyor Belt (1 Iron Ingot)</button>
    <button class="craft-btn" onclick="socket.emit('craft', 'auto_crafter')">Auto Crafter (10 Bolt, 5 Iron Ingot)</button>
    <button class="craft-btn" style="border-color:gold" onclick="socket.emit('craft', 'drill')">Tier 1 Drill (5 Wire, 10 Bolt, 1 Gold Ingot)</button>
    <button class="close-btn" onclick="document.getElementById('crafting-menu').style.display='none'">CLOSE</button>
  </div>

  <div id="chat-box">
    <div id="chat-messages"></div>
    <input type="text" id="chat-input" placeholder="Type message... (Enter to send)">
  </div>

  <div id="hotbar">
    <div class="slot active" id="slot-0">LASER</div>
    <div class="slot" id="slot-1">EMPTY</div>
    <div class="slot" id="slot-2">EMPTY</div>
    <div class="slot" id="slot-3">EMPTY</div>
  </div>

  <div id="mobile-ui">
    <div id="joystick-base"><div id="joystick-stick"></div></div>
    <div id="action-btn">USE</div>
  </div>

  <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>
  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="client.js"></script>
</body>
</html>
